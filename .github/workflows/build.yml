# .github/workflows/build.yml
name: Build Executables

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Numer wersji (np. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    env:
      PYTHONUTF8: 1
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Install UPX
        uses: crazy-max/ghaction-upx@v3
        with:
          install-only: true
          
      - name: Get tag version
        id: get_version
        shell: pwsh
        run: |
          # Extract the version number without the 'v' prefix
          $tag = "${{ github.event.inputs.version }}"
          $version = $tag.TrimStart('v')
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          
      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed --icon="assets/icon.ico" --exclude-module "numpy" --exclude-module "pandas" --exclude-module "unittest" --exclude-module "pydoc" --exclude-module "xml" --name "Discord_Stream_Overlay-${{ steps.get_version.outputs.VERSION }}-Windows-x86_64" embed_discord.py

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          files: |
            dist/Discord_Stream_Overlay-${{ steps.get_version.outputs.VERSION }}-Windows-x86_64.exe
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux Binary
    runs-on: ubuntu-22.04
    env:
      PYTHONUTF8: 1
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Print Build Environment
        run: |
          python -VV
          pyinstaller --version
          uname -a
          
      - name: Get tag version
        id: get_version
        run: |
          TAG="${{ github.event.inputs.version }}"
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          
      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed \
            --add-data "assets/icon.png:assets" \
            --name "Discord_Stream_Overlay-${{ steps.get_version.outputs.VERSION }}-Linux-x86_64" \
            --exclude-module "tkinter" \
            --exclude-module "pystray" \
            --exclude-module "PIL" \
            --exclude-module "win32gui" \
            --exclude-module "pywebview" \
            --exclude-module "win32con" \
            --exclude-module "win32api" \
            --exclude-module "webview" \
            --exclude-module "numpy" \
            --exclude-module "pandas" \
            --exclude-module "unittest" \
            --exclude-module "pydoc" \
            --exclude-module "xml" \
            embed_linux.py

      - name: Print Linux Artifact Size
        run: |
          ls -lh "dist/Discord_Stream_Overlay-${{ steps.get_version.outputs.VERSION }}-Linux-x86_64"
          stat --printf='%n %s bytes\n' "dist/Discord_Stream_Overlay-${{ steps.get_version.outputs.VERSION }}-Linux-x86_64"

      - name: Upload Linux Binary to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version }}
          files: |
            dist/Discord_Stream_Overlay-${{ steps.get_version.outputs.VERSION }}-Linux-x86_64
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}